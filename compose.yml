services:
  meshdaemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: meshdaemon:latest

    # Use host network mode to receive UDP multicast packets from host network
    # This is required for Meshtastic LAN UDP (224.0.0.69:4403)
    network_mode: host

    # Restart unless explicitly stopped
    restart: unless-stopped

    # Load environment variables from .env file
    # Copy .env.example to .env and customize for your deployment
    # env_file:
    #   - .env

    # Health check - verify process is running
    # Note: Multicast connectivity testing inside container requires network awareness
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*app.main"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Log configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
